<body>
    <div class="site-wrapper">

        <div id="header-container"></div>

        <main class="contact-page-wrapper">
            <!-- Hero with THREE JS -->
            <div class="contact-hero-wrapper">
                <div id="threejs-canvas-contact"></div>
                <!-- Ambient glowing effects -->
                <div class="gradient-mesh-bg">
                    <div class="mesh-blob blob-purple" style="opacity: 0.3;"></div>
                    <div class="mesh-blob blob-cyan" style="opacity: 0.2;"></div>
                    <div class="mesh-blob blob-magenta" style="opacity: 0.2;"></div>
                </div>
                <div class="hero-blur-overlay"></div>

                <div class="contact-hero-content">
                    <h1 class="hero-title g-reveal" style="color: white; margin-bottom: 0;">Contact <span class="text-gradient-fluid">Us.</span></h1>
                </div>
            </div>

            <!-- PREMIUM ENQUIRY FORM SECTION -->
            <section class="contact-main-section">
                <div class="container">
                    <div class="row align-items-center">
                        <!-- Left Hemisphere: Get in Touch -->
                        <div class="col-lg-5 col-md-12">
                            <div class="contact-info-block g-reveal">
                                <h2 class="contact-heading">Get In Touch</h2>
                                <p class="contact-desc">Reach out to our dedicated support team for any inquiries.</p>

                                <div class="contact-item">
                                    <div class="icon-circle">
                                        <i class="fa-solid fa-phone"></i>
                                    </div>
                                    <div class="contact-item-text">
                                        <h4>Call Us</h4>
                                        <p>+91 8111850054</p>
                                    </div>
                                </div>

                                <div class="contact-item">
                                    <div class="icon-circle">
                                        <i class="fa-solid fa-envelope"></i>
                                    </div>
                                    <div class="contact-item-text">
                                        <h4>Email Us</h4>
                                        <p style="word-break: break-all;">eduoozinternationalacademy@gmail.com</p>
                                    </div>
                                </div>

                                <div class="contact-item">
                                    <div class="icon-circle">
                                        <i class="fa-solid fa-location-dot"></i>
                                    </div>
                                    <div class="contact-item-text">
                                        <h4>Eduooz International Academy</h4>
                                        <p>2nd floor, Terminal Plaza, Bypass road, Chakkai, Trivandrum, Kerala - 695024,
                                            India</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Hemisphere: Form Card -->
                        <div class="col-lg-7 col-md-12">
                            <div class="form-container g-reveal">
                                <div class="contact-form-card">
                                    <h3>Your Details</h3>
                                    <form id="contactForm" class="custom-form">
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label for="name">Name <span class="required">*</span></label>
                                                <input type="text" id="name" name="name" placeholder="Your Name" required>
                                            </div>
                                            <div class="form-group">
                                                <label for="email">Email Address <span class="required">*</span></label>
                                                <input type="email" id="email" name="email" placeholder="Your Email" required>
                                            </div>
                                        </div>
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label for="phone">Phone Number</label>
                                                <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="Your Phone Number">
                                            </div>
                                            <div class="form-group">
                                                <label for="subject">Subject</label>
                                                <input type="text" id="subject" name="subject" placeholder="Message Subject">
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label for="message">Comments / Questions <span
                                                    class="required">*</span></label>
                                            <textarea id="message" name="message" rows="3" placeholder="Your Message"
                                                required></textarea>
                                        </div>
                                        <button type="submit" class="btn-submit magnetic-btn">Send Message</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Map and CTA Section -->
            <section class="map-cta-section">
                <!-- Map Container -->

                        referrerpolicy="no-referrer-when-downgrade"></iframe>
