<section class="enquiry-premium-section" id="contact">
    <div class="container relative-z">
        <div class="enquiry-glass-panel">

            <div class="enquiry-grid">
                <!-- Left: Content -->
                <div class="enquiry-info">
                    <div class="frost-pill-light" style="margin-bottom: 20px;">
                        <span class="glowing-dot-magenta"></span> Priority Support
                    </div>
                    <h2 class="enquiry-title">Start your <br><span class="text-gradient-fluid">journey today.</span></h2>
                    <p class="enquiry-subtitle">Have questions about our syllabus, batches, or international placement? Drop us a line and our academic counselors will get back to you within 24 hours.</p>

                    <div class="contact-methods">
                        <div class="c-method">
                            <div class="c-icon"><i class="fa-solid fa-phone"></i></div>
                            <div>
                                <h5>Call Us Anytime</h5>
                                <p>+91 8111850054</p>
                            </div>
                        </div>
                        <div class="c-method">
                            <div class="c-icon"><i class="fa-solid fa-envelope"></i></div>
                            <div>
                                <h5>Email Us</h5>
                                <p>admissions@eduooz.online</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Form -->
                <div class="enquiry-form-wrapper">
                    <form class="glass-form" onsubmit="event.preventDefault(); alert('Form Submitted Successfully');">
                        <div class="form-row">
                            <div class="input-group">
                                <input type="text" id="enquiry-name" required placeholder="Full Name">
                            </div>
                            <div class="input-group">
                                <input type="tel" id="enquiry-phone" required placeholder="Phone Number">
                            </div>
                        </div>

                        <div class="input-group select-wrapper">
                            <select id="enquiry-course" required>
                                <option value="" disabled selected>Select Course Category</option>
                                <option value="nursing">Nursing Coaching (AIIMS / RRB)</option>
                                <option value="pharma">Pharmacist Exams</option>
                                <option value="lab">Lab Technician Courses</option>
                                <option value="dha">International (DHA / HAAD)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>

                        <div class="input-group">
                            <textarea id="enquiry-message" rows="4" required placeholder="How can we help you?"></textarea>
                        </div>

                        <button type="submit" class="btn-form-submit">
                            Submit Enquiry <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</section>
