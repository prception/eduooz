<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Eduooz International Academy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <link rel="stylesheet" href="assets/css/header-footer.css">
    <link rel="stylesheet" href="assets/css/gallery.css">
</head>
<body>
    
    <div id="header-container"></div>

    <div class="color-mesh">
        <div class="blob purple-blob"></div>
        <div class="blob cyan-blob"></div>
        <div class="blob magenta-blob"></div>
    </div>


    <section class="gallery-hero-section">
        <div class="container relative-z text-center">
            <div class="frost-pill-dark mb-4 g-gal-reveal">
                <span class="glowing-dot-cyan"></span> Inside Eduooz
            </div>
            <h1 class="gallery-title g-gal-reveal">
                Glimpses of <span class="text-gradient-fluid">Greatness.</span>
            </h1>
            <p class="gallery-subtitle mx-auto g-gal-reveal">
                Step inside the ecosystem where global healthcare leaders are forged.
            </p>
        </div>
    </section>

    <section class="gallery-wall-section" id="gallery-trigger">
        
        <div class="custom-glass-cursor" id="gallery-cursor">
            <span>VIEW</span>
        </div>

        <div class="gallery-wall-wrapper">
            
            <div class="gal-column col-slow">
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80&w=800" alt="Students in class"></div>
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&q=80&w=800" alt="Faculty teaching"></div>
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=800" alt="Digital learning"></div>
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&q=80&w=800" alt="Nursing practicals"></div>
            </div>

            <div class="gal-column col-fast" style="margin-top: 20vh;">
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&q=80&w=800" alt="Campus architecture"></div>
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&q=80&w=800" alt="Lab equipment"></div>
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1587854692152-cbe668df971c?auto=format&fit=crop&q=80&w=800" alt="Pharmacy discussion"></div>
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&q=80&w=800" alt="Library"></div>
            </div>

            <div class="gal-column col-medium" style="margin-top: 10vh;">
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&q=80&w=800" alt="Global seminar"></div>
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=800" alt="Tech integration"></div>
                <div class="gal-img-card"><img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&q=80&w=800" alt="Student collaboration"></div>
                <div class="gal-img-card tall"><img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&q=80&w=800" alt="Graduation success"></div>
            </div>

        </div>
    </section>

    <div class="custom-lightbox" id="gallery-lightbox">
        <button class="lightbox-close" id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
        <div class="lightbox-content">
            <img src="" alt="Expanded View" id="lightbox-img">
        </div>
    </div>


    <div class="mt-5" id="footer-container"></div>
    


    <!-- Chat Button -->
    <div id="chat-container"></div>

    <!-- Scroll to Top Button -->
    <button class="scroll-to-top" id="scrollTopBtn" aria-label="Scroll to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>


    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/gallery.js"></script>
</body>
</html>
